{% load static %}
<!DOCTYPE html>
<html class="dark" lang="en">

{% include 'core/seo_meta.html' %}
<title>Password Updated — K-Beats</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: { extend: {
                colors: { primary: "#f425c0", "background-dark": "#000000", secondary: "#00f0ff" },
                fontFamily: { display: ["Montserrat", "sans-serif"] },
                borderRadius: { DEFAULT: "0px", sm: "0px", md: "0px", lg: "0px", xl: "0px", "2xl": "0px", "3xl": "0px", full: "9999px" },

{% include 'core/shared_head.html' %}

<body class="bg-background-dark text-slate-100 font-display min-h-screen flex flex-col overflow-x-hidden">

    {% include 'core/footer.html' %}
