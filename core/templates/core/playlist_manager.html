{% load static %}
<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Playlist Manager & Scheduler | K-Beats</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f425c0",
                        "background-dark": "#000000",
                        "secondary": "#00f0ff",
                        "surface": "#111111",
                    },
                    fontFamily: {
                        "display": ["Montserrat", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0px" },
                },
            },
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #f425c0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sortable-ghost { opacity: 0.4; background: #f425c0 !important; }
        .glass-panel { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(12px); }
        body { zoom: 0.9; }
    </style>
</head>
<body class="bg-black text-white font-display min-h-screen flex flex-col overflow-hidden">

<!-- Header -->
{% include 'core/header.html' %}

<main class="flex-1 flex flex-col overflow-hidden pt-20" x-data="playlistApp()">
    
    <!-- Tab Navigation -->
    <div class="bg-surface border-b border-white/10 px-8 flex gap-8">
        <button @click="activeTab = 'builder'" 
                :class="activeTab === 'builder' ? 'border-primary text-primary' : 'border-transparent text-slate-500 hover:text-white'"
                class="py-4 text-[11px] font-black uppercase tracking-[0.2em] border-b-2 transition-all flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">construction</span> Playlist Builder
        </button>
        <button @click="activeTab = 'scheduler'" 
                :class="activeTab === 'scheduler' ? 'border-secondary text-secondary' : 'border-transparent text-slate-500 hover:text-white'"
                class="py-4 text-[11px] font-black uppercase tracking-[0.2em] border-b-2 transition-all flex items-center gap-2">
            <span class="material-symbols-outlined text-sm">calendar_view_week</span> Weekly Scheduler
        </button>
    </div>

    <!-- TAB 1: BUILDER -->
    <div x-show="activeTab === 'builder'" class="flex-1 flex overflow-hidden">
        <!-- LEFT PANEL: Track Library -->
        <div class="w-80 border-r border-white/10 flex flex-col bg-surface/50">
            <div class="p-4 border-b border-white/10 bg-surface">
                <h2 class="text-xs font-black uppercase tracking-widest text-secondary flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">cloud</span> Media Library
                </h2>
                <div class="mt-4 relative">
                          <input type="text" x-model="searchQuery" placeholder="Search B2 tracks..." 
                              class="w-full bg-black/50 border border-white/10 px-3 py-2 text-xs font-mono placeholder-slate-600 focus:border-secondary outline-none uppercase mb-2">
                          <input type="text" x-model="groupQuery" placeholder="Group names..." 
                              class="w-full bg-black/50 border border-white/10 px-3 py-2 text-xs font-mono placeholder-primary focus:border-primary outline-none uppercase" style="margin-top: 6px;">
                </div>
            </div>
            
            <div id="library-list" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-2">
                <template x-for="track in filteredTracks" :key="track.fileId">
                    <div :data-url="track.url" :data-name="track.name" :data-artist="track.artist" :data-album-art="track.album_art"
                         class="library-item group flex items-center gap-3 p-3 bg-white/5 border border-white/10 cursor-grab hover:border-secondary transition-all">
                        <div class="w-10 h-10 bg-black border border-white/10 group-hover:border-secondary/50 overflow-hidden flex-shrink-0">
                            <img x-show="track.album_art" :src="track.album_art" alt="album art" class="w-full h-full object-cover">
                            <div x-show="!track.album_art" class="w-full h-full flex items-center justify-center">
                                <span class="material-symbols-outlined text-sm text-slate-500 group-hover:text-secondary">music_note</span>
                            </div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-[10px] font-bold truncate uppercase" x-text="track.name"></p>
                            <p class="text-[9px] font-mono text-slate-500 truncate uppercase" x-text="track.artist || 'Unknown Artist'"></p>
                        </div>
                        <button @click="addTrack(track)" class="opacity-0 group-hover:opacity-100 bg-secondary/20 hover:bg-secondary text-secondary hover:text-black p-1 transition-all">
                            <span class="material-symbols-outlined text-xs">add</span>
                        </button>
                    </div>
                </template>
            </div>
        </div>

        <!-- MIDDLE PANEL: Builder -->
        <div class="flex-1 flex flex-col">
            <div class="p-6 border-b border-white/10 bg-surface flex items-center justify-between">
                <div>
                    <input type="text" x-model="currentPlaylist.name" placeholder="PLAYLIST NAME" 
                           class="bg-transparent text-2xl font-black border-none focus:ring-0 uppercase tracking-tighter w-full">
                </div>
                <div class="flex gap-3">
                    <button @click="createNewPlaylist" class="bg-white/5 border border-white/10 px-4 py-2 text-[10px] font-bold uppercase tracking-widest hover:bg-white/10 transition-colors flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">add_box</span> New
                    </button>
                    <div class="relative" x-data="{ open: false }">
                        <button @click="open = !open" class="bg-white/5 border border-white/10 px-4 py-2 text-[10px] font-bold uppercase tracking-widest hover:bg-white/10 transition-colors flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">folder_open</span> Load
                        </button>
                        <div x-show="open" @click.away="open = false" class="absolute right-0 mt-2 w-64 bg-surface border border-white/10 shadow-2xl z-50 py-2">
                            {% for p in playlists %}
                            <button @click="loadPlaylist({{ p.id }}); open = false" class="w-full text-left px-4 py-2 text-[10px] font-bold uppercase hover:bg-primary hover:text-black transition-colors">{{ p.name }}</button>
                            {% endfor %}
                        </div>
                    </div>
                    <button @click="savePlaylist" class="bg-primary text-black px-4 py-2 text-[10px] font-bold uppercase tracking-widest transition-all shadow-[4px_4px_0px_#ffffff]">Update/Save</button>
                    <button @click="assignToSchedule" class="bg-secondary text-black px-4 py-2 text-[10px] font-bold uppercase tracking-widest transition-all shadow-[4px_4px_0px_#ffffff]">Assign To Schedule</button>
                </div>
            </div>

            <div id="playlist-builder" class="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-3 bg-black/20">
                <template x-for="(track, index) in currentPlaylist.tracks" :key="index">
                    <div class="flex items-center gap-4 p-4 bg-white/[0.03] border border-white/10 group">
                        <span class="text-[10px] font-mono text-slate-600 w-4" x-text="(index + 1).toString().padStart(2, '0')"></span>
                        <div class="w-10 h-10 bg-black border border-white/10 overflow-hidden flex-shrink-0">
                            <img x-show="track.album_art" :src="track.album_art" alt="album art" class="w-full h-full object-cover">
                            <div x-show="!track.album_art" class="w-full h-full flex items-center justify-center">
                                <span class="material-symbols-outlined text-sm text-slate-500">music_note</span>
                            </div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <input type="text" x-model="track.title" class="bg-transparent border-none p-0 text-sm font-bold uppercase tracking-tight focus:ring-0 w-full">
                            <input type="text" x-model="track.artist" class="bg-transparent border-none p-0 text-[10px] font-mono text-slate-500 uppercase tracking-widest focus:ring-0 w-full">
                        </div>
                        <button @click="removeTrack(index)" class="text-slate-600 hover:text-red-500"><span class="material-symbols-outlined text-sm">delete</span></button>
                        <span class="material-symbols-outlined text-slate-700 cursor-move">drag_indicator</span>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- TAB 2: SCHEDULER (Horizontal Grid) -->
    <div x-show="activeTab === 'scheduler'" class="flex-1 flex overflow-hidden">
        <!-- Sidebar: Saved Playlists -->
        <div class="w-64 border-r border-white/10 flex flex-col bg-surface/50">
            <div class="p-4 border-b border-white/10 bg-surface">
                <h2 class="text-xs font-black uppercase tracking-widest text-primary flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">list</span> Saved Playlists
                </h2>
            </div>
            <div id="draggable-playlists" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-2">
                {% for p in playlists %}
                <div data-id="{{ p.id }}" data-name="{{ p.name }}"
                     class="playlist-item p-3 bg-white/5 border border-white/10 cursor-grab hover:border-primary transition-all">
                    <p class="text-[10px] font-bold uppercase truncate">{{ p.name }}</p>
                </div>
                {% endfor %}
            </div>
        </div>

        <!-- Main Calendar Grid -->
        <div class="flex-1 overflow-hidden flex flex-col">
            <!-- Timeline Header (Hours) -->
            <div class="flex border-b border-white/10 bg-surface">
                <div class="w-16 border-r border-white/10 flex-shrink-0"></div> <!-- Day column placeholder -->
                <div class="flex-1 flex overflow-x-auto no-scrollbar">
                    <template x-for="hour in 24">
                        <div class="w-24 flex-shrink-0 border-r border-white/5 py-2 text-center">
                            <span class="text-[9px] font-mono text-slate-500" x-text="(hour-1).toString().padStart(2, '0') + ':00'"></span>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Grid Rows (Days) -->
            <div class="flex-1 overflow-y-auto overflow-x-hidden">
                <template x-for="day in ['MON','TUE','WED','THU','FRI','SAT','SUN']">
                    <div class="flex border-b border-white/10 hover:bg-white/[0.02] transition-colors min-h-[80px]">
                        <!-- Day Label -->
                        <div class="w-16 border-r border-white/10 flex-shrink-0 flex items-center justify-center bg-black/40">
                            <span class="text-[10px] font-black uppercase -rotate-90 tracking-widest text-slate-400" x-text="day"></span>
                        </div>
                        <!-- Cells -->
                        <div class="flex-1 flex overflow-x-auto no-scrollbar relative grid-row" :data-day="day">
                            <template x-for="hour in 24">
                                <div class="w-24 flex-shrink-0 border-r border-white/5 relative grid-cell h-full min-h-[80px]" 
                                     @click="openQuickSchedule(day, hour-1)"
                                     :data-hour="hour-1">
                                </div>
                            </template>

                            <!-- Absolute Positioned Scheduled Blocks -->
                            <template x-for="slot in (daySchedules[day] || [])" :key="slot.id">
                                <div class="absolute top-1 bottom-1 bg-secondary/20 border border-secondary/50 p-2 overflow-hidden group cursor-pointer"
                                     @click.stop="openEditSchedule(slot)"
                                     :style="getSlotStyle(slot)">
                                    <div class="flex justify-between items-start">
                                        <p class="text-[9px] font-black uppercase truncate text-secondary" x-text="slot.name"></p>
                                        <button @click.stop="deleteSchedule(slot.id)" class="opacity-0 group-hover:opacity-100 text-white/50 hover:text-red-500">
                                            <span class="material-symbols-outlined text-[10px]">close</span>
                                        </button>
                                    </div>
                                    <p class="text-[8px] font-mono text-white/40 uppercase mt-1" x-text="slot.time + ' - ' + slot.duration.replace('Until ', '')"></p>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Modal: Schedule Event -->
    <div x-show="showScheduleModal" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/90 backdrop-blur-xl" style="display: none;">
        <div class="bg-surface border border-white/10 w-full max-w-sm p-8 shadow-2xl">
            <h3 class="text-xl font-black uppercase tracking-tighter mb-6">Schedule on <span class="text-primary" x-text="activeDay"></span></h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[9px] font-mono text-slate-500 uppercase tracking-widest mb-1">Target Playlist</label>
                    <p class="text-sm font-bold uppercase truncate border-b border-white/10 pb-2" x-text="newSchedule.playlist_name"></p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[9px] font-mono text-slate-500 uppercase tracking-widest mb-1">Start</label>
                        <input type="time" x-model="newSchedule.start" class="w-full bg-black border border-white/10 p-2 text-xs text-white">
                    </div>
                    <div>
                        <label class="block text-[9px] font-mono text-slate-500 uppercase tracking-widest mb-1">End</label>
                        <input type="time" x-model="newSchedule.end" class="w-full bg-black border border-white/10 p-2 text-xs text-white">
                    </div>
                </div>
                <div>
                    <label class="block text-[9px] font-mono text-slate-500 uppercase tracking-widest mb-1">Host</label>
                    <input type="text" x-model="newSchedule.host" class="w-full bg-black border border-white/10 p-2 text-xs text-white uppercase">
                </div>
            </div>

            <div class="flex gap-4 mt-8">
                <button @click="showScheduleModal = false" class="flex-1 border border-white/10 py-3 text-[10px] font-bold uppercase">Cancel</button>
                <button @click="saveSchedule" class="flex-1 bg-secondary text-black py-3 text-[10px] font-bold uppercase shadow-[4px_4px_0px_#f425c0]">Confirm</button>
            </div>
        </div>
    </div>

</main>

<script>
function playlistApp() {
    return {
        activeTab: 'builder',
        tracks: [],
        searchQuery: '',
        groupQuery: '',
        currentPlaylist: { id: null, name: 'Untitled Playlist', tracks: [] },
        daySchedules: {},
        activeDay: 'MON',
        showScheduleModal: false,
        newSchedule: { playlist_id: null, playlist_name: '', start: '09:00', end: '10:00', host: 'Auto DJ' },

        async init() {
            await this.fetchB2Tracks();
            await this.fetchSchedules();
            this.initSortable();
        },

        async fetchB2Tracks() {
            try {
                const resp = await fetch('/api/b2-tracks/');
                const data = await resp.json();
                if (data.ok) this.tracks = data.tracks;
            } catch (e) {}
        },

        async fetchSchedules() {
            try {
                const resp = await fetch('/api/schedule-data/');
                this.daySchedules = await resp.json();
            } catch (e) {}
        },

        get filteredTracks() {
            let filtered = this.tracks;
            if (this.searchQuery) {
                const q = this.searchQuery.toLowerCase();
                filtered = filtered.filter(t => t.name.toLowerCase().includes(q));
            }
            if (this.groupQuery) {
                const g = this.groupQuery.toLowerCase();
                filtered = filtered.filter(t => (t.artist || '').toLowerCase().includes(g));
            }
            return filtered;
        },

        initSortable() {
            // Builder Logic
            new Sortable(document.getElementById('library-list'), {
                group: { name: 't', pull: 'clone', put: false },
                sort: false
            });

            new Sortable(document.getElementById('playlist-builder'), {
                group: 't',
                animation: 150,
                onAdd: (evt) => {
                    const { url, name, artist, albumArt } = evt.item.dataset;
                    evt.item.remove();
                    this.addTrack({ url, name, artist, album_art: albumArt }, evt.newIndex);
                },
                onUpdate: (evt) => {
                    const item = this.currentPlaylist.tracks.splice(evt.oldIndex, 1)[0];
                    this.currentPlaylist.tracks.splice(evt.newIndex, 0, item);
                }
            });

            // Scheduler Logic (Drag Playlists onto Grid)
            new Sortable(document.getElementById('draggable-playlists'), {
                group: { name: 'p', pull: 'clone', put: false },
                sort: false
            });
            
            // Allow grid rows to accept playlists
            document.querySelectorAll('.grid-row').forEach(row => {
                new Sortable(row, {
                    group: 'p',
                    onAdd: (evt) => {
                        const { id, name } = evt.item.dataset;
                        const day = row.dataset.day;
                        // Calculate hour based on drop position relative to row
                        const rect = row.getBoundingClientRect();
                        const x = evt.originalEvent.clientX - rect.left;
                        const hour = Math.floor(x / 96); // 96px is cell width (w-24)
                        
                        evt.item.remove();
                        this.openQuickSchedule(day, hour, id, name);
                    }
                });
            });
        },

        addTrack(track, index = null) {
            const newTrack = {
                title: track.title || (track.name ? track.name.replace(/\.[^/.]+$/, "") : 'New Track'),
                artist: track.artist || 'Unknown Artist',
                url: track.url,
                album_art: track.album_art || ''
            };
            if (index !== null) {
                this.currentPlaylist.tracks.splice(index, 0, newTrack);
            } else {
                this.currentPlaylist.tracks.push(newTrack);
            }
        },

        createNewPlaylist() {
            if (this.currentPlaylist.tracks.length > 0 && !confirm('Discard current playlist and start new?')) return;
            this.currentPlaylist = { id: null, name: 'Untitled Playlist', tracks: [] };
        },

        assignToSchedule() {
            if (!this.currentPlaylist.id) {
                alert('Please save the playlist first before assigning it to the schedule.');
                return;
            }
            this.activeTab = 'scheduler';
        },

        removeTrack(index) {
            this.currentPlaylist.tracks.splice(index, 1);
        },

        openQuickSchedule(day, hour, pId = null, pName = null) {
            this.activeDay = day;
            this.newSchedule.playlist_id = pId || (this.currentPlaylist.id ? this.currentPlaylist.id : null);
            this.newSchedule.playlist_name = pName || (this.currentPlaylist.name || 'Current Builder Playlist');
            
            const hStr = hour.toString().padStart(2, '0');
            const endH = (hour + 1).toString().padStart(2, '0');
            this.newSchedule.start = `${hStr}:00`;
            this.newSchedule.end = `${endH}:00`;
            this.showScheduleModal = true;
        },

        getSlotStyle(slot) {
            const startParts = slot.time.split(':');
            const startH = parseInt(startParts[0]);
            const startM = parseInt(startParts[1]);
            const left = (startH * 96) + (startM / 60 * 96);
            
            // Duration calculation
            const endParts = slot.duration.replace('Until ', '').split(':');
            const endH = parseInt(endParts[0]);
            const endM = parseInt(endParts[1]);
            const totalStartM = startH * 60 + startM;
            const totalEndM = endH * 60 + endM;
            const width = ((totalEndM - totalStartM) / 60) * 96;
            
            return `left: ${left}px; width: ${width}px;`;
        },

        async savePlaylist() {
            const resp = await fetch('/api/playlist/save/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                body: JSON.stringify(this.currentPlaylist)
            });
            const data = await resp.json();
            if (data.ok) {
                this.currentPlaylist.id = data.id;
                alert('Saved!');
            }
        },

        async loadPlaylist(id) {
            const resp = await fetch(`/api/playlist/${id}/data/`);
            const data = await resp.json();
            if (data.ok) this.currentPlaylist = data.playlist;
        },

        async saveSchedule() {
            if (!this.newSchedule.playlist_id) return alert('Select a playlist first');
            const resp = await fetch('/api/schedule/save/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                body: JSON.stringify({
                    day: this.activeDay,
                    start_time: this.newSchedule.start,
                    end_time: this.newSchedule.end,
                    playlist_id: this.newSchedule.playlist_id,
                    host: this.newSchedule.host
                })
            });
            const data = await resp.json();
            if (data.ok) {
                this.showScheduleModal = false;
                await this.fetchSchedules();
            }
        },

        async deleteSchedule(id) {
            if (!confirm('Delete?')) return;
            const resp = await fetch(`/api/schedule/${id}/delete/`, {
                method: 'POST',
                headers: { 'X-CSRFToken': '{{ csrf_token }}' }
            });
            if ((await resp.json()).ok) await this.fetchSchedules();
        }
    };
}
</script>

</body>
</html>
