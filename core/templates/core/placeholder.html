{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Beats - Coming Soon</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #22101e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
            overflow: hidden;
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(244, 37, 192, 0.3);
            border-radius: 24px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 30px rgba(244, 37, 192, 0.2);
            text-align: center;
            max-width: 600px;
            position: relative;
            z-index: 10;
        }
        h1 {
            color: #fff;
            font-size: 2.5em;
            margin-bottom: 20px;
            word-break: break-word;
            font-weight: 900;
            font-style: italic;
        }
        h1 span { color: #f425c0; }
        p {
            color: #bbb;
            font-size: 1.2em;
            line-height: 1.6;
        }
        .emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(244, 37, 192, 0.3) 0%, transparent 70%);
            filter: blur(50px);
            z-index: 0;
            border-radius: 50%;
        }
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 30px;
            background: #f425c0;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(244, 37, 192, 0.4);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(244, 37, 192, 0.6);
            background: #ff4bc7;
        }
    </style>
</head>
<body>
    <div class="bg-glow" style="top: -100px; left: -100px;"></div>
    <div class="bg-glow" style="bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(0, 240, 255, 0.3) 0%, transparent 70%);"></div>
    
    <div class="container">
        <div class="emoji">🚀</div>
        <h1>K-POP<span>PULSE</span></h1>
        <p>We're polishing this feature for the ultimate fan experience. Stay tuned!</p>
        <a href="{% url 'home' %}" class="btn">Back to Home</a>
    </div>
</body>
</html>
