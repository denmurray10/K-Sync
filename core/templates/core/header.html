{% load static %}
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  .nav-cinzel { font-family: 'Cinzel', serif; letter-spacing: 0.2rem; font-size: 12px; }
  h1, h2, h3, h4, h5, h6 { font-family: 'Cinzel', serif; }
  body { font-family: 'Montserrat', sans-serif; }
  .header-glass {
    background-color: rgba(0, 0, 0, 0.6) !important;
    backdrop-filter: blur(16px) !important;
    -webkit-backdrop-filter: blur(16px) !important;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
    padding-top: 1rem !important;
    padding-bottom: 1rem !important;
  }
  header {
    transition: background-color 0.4s ease, backdrop-filter 0.4s ease, border-color 0.4s ease, padding 0.4s ease !important;
    will-change: background-color, backdrop-filter, padding;
    background-color: rgba(0,0,0,0);
    backdrop-filter: blur(0px);
    border-bottom: 1px solid transparent;
  }
</style>

{% if request.resolver_match.url_name == 'live' %}
<!-- ───── LIVE PAGE HEADER ───── -->
<header id="main-header" class="fixed top-0 left-0 right-0 z-50 px-6 py-8 bg-transparent border-none">
    <div class="container mx-auto flex items-center justify-between">
        <!-- Logo + Nav -->
        <div class="flex items-center gap-8">
            <a href="{% url 'home' %}" class="flex items-center gap-2 group shrink-0">
                <img src="https://res.cloudinary.com/diuanqnce/image/upload/f_auto,q_auto/ksync/logo" alt="K-Beats Logo" class="h-16 md:h-24 w-auto -ml-4 md:-ml-[58px] -my-2 md:-my-7 object-contain drop-shadow-[0_0_8px_rgba(244,37,192,0.6)] group-hover:drop-shadow-[0_0_12px_rgba(0,240,255,0.7)] transition-all">
            </a>
            <nav class="hidden md:flex items-center gap-6">
                <a class="{% if request.resolver_match.url_name == 'live' %}text-primary nav-cinzel font-normal uppercase tracking-wide neon-text-pink underline decoration-2 underline-offset-8{% else %}nav-cinzel text-slate-300 hover:text-primary font-normal uppercase tracking-wide transition-colors{% endif %}" href="{% url 'live' %}">Live</a>
                <a class="{% if request.resolver_match.url_name == 'charts' %}text-primary nav-cinzel font-normal uppercase tracking-wide neon-text-pink underline decoration-2 underline-offset-8{% else %}nav-cinzel text-slate-300 hover:text-primary font-normal uppercase tracking-wide transition-colors{% endif %}" href="{% url 'charts' %}">Charts</a>
                <a class="{% if request.resolver_match.url_name == 'idols' or request.resolver_match.url_name == 'idol_page' or request.resolver_match.url_name == 'idol_universe' %}text-primary nav-cinzel font-normal uppercase tracking-wide neon-text-pink underline decoration-2 underline-offset-8{% else %}nav-cinzel text-slate-300 hover:text-primary font-normal uppercase tracking-wide transition-colors{% endif %}" href="{% url 'idols' %}">Idols</a>
                <a class="{% if request.resolver_match.url_name == 'schedule' %}text-primary nav-cinzel font-normal uppercase tracking-wide neon-text-pink underline decoration-2 underline-offset-8{% else %}nav-cinzel text-slate-300 hover:text-primary font-normal uppercase tracking-wide transition-colors{% endif %}" href="{% url 'schedule' %}">Schedule</a>
                <a class="{% if request.resolver_match.url_name == 'news' %}text-primary nav-cinzel font-normal uppercase tracking-wide neon-text-pink underline decoration-2 underline-offset-8{% else %}nav-cinzel text-slate-300 hover:text-primary font-normal uppercase tracking-wide transition-colors{% endif %}" href="{% url 'news' %}">News</a>
                <a class="{% if request.resolver_match.url_name == 'shop' %}text-primary nav-cinzel font-normal uppercase tracking-wide neon-text-pink underline decoration-2 underline-offset-8{% else %}nav-cinzel text-slate-300 hover:text-primary font-normal uppercase tracking-wide transition-colors{% endif %}" href="{% url 'shop' %}">Shop</a>
            </nav>
        </div>

        <!-- Status + Actions -->
        <div class="flex items-center gap-4">
            <!-- Live badge -->
            <div class="flex items-center gap-2 px-3 py-1.5 rounded-full glass-bright border border-red-500/30">
                <span class="relative flex h-2.5 w-2.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-500 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
                </span>
                <span class="text-xs font-bold uppercase tracking-wider text-red-400">Live On Air</span>
            </div>
            <!-- Listener count -->
            <div class="hidden sm:flex items-center gap-1.5 text-slate-400 text-xs font-medium">
                <span class="material-symbols-outlined text-base text-secondary">headphones</span>
                <span id="listener-count">3,847</span> Listening
            </div>
            <!-- Settings -->
            <button class="w-9 h-9 rounded-full glass-bright flex items-center justify-center text-slate-300 hover:text-white transition-colors border border-white/10">
                <span class="material-symbols-outlined text-xl">settings</span>
            </button>
            <!-- Log In -->
            <a class="hidden md:block nav-cinzel text-white hover:text-primary transition-colors font-normal uppercase tracking-wide px-2" href="{% url 'login' %}">Log In</a>
        </div>
    </div>
</header>
{% else %}
<!-- ───── STANDARD HEADER ───── -->
<header id="main-header" class="bg-transparent fixed top-0 left-0 right-0 z-50 px-6 py-8 border-none">
    <div class="container mx-auto flex items-center justify-between">
        <div class="flex items-center gap-10">
            <a class="flex items-center gap-3 text-primary hover:text-secondary transition-colors duration-300 group" href="{% url 'home' %}">
                <img src="https://res.cloudinary.com/diuanqnce/image/upload/f_auto,q_auto/ksync/logo" alt="K-Beats Logo" class="h-16 md:h-24 w-auto -ml-4 md:-ml-[58px] -my-2 md:-my-7 object-contain drop-shadow-[0_0_8px_rgba(244,37,192,0.6)] group-hover:drop-shadow-[0_0_12px_rgba(0,240,255,0.7)] transition-all">
            </a>
            <nav class="hidden md:flex items-center gap-6">
                <a class="{% if request.resolver_match.url_name == 'live' %}nav-cinzel text-primary font-normal uppercase tracking-wide transition-colors underline decoration-2 underline-offset-8{% else %}nav-cinzel text-slate-200 hover:text-primary font-normal uppercase tracking-wide transition-colors{% endif %}" href="{% url 'live' %}">Live</a>
                <a class="{% if request.resolver_match.url_name == 'charts' %}nav-cinzel text-primary font-normal uppercase tracking-wide transition-colors underline decoration-2 underline-offset-8{% else %}nav-cinzel text-slate-200 hover:text-primary font-normal uppercase tracking-wide transition-colors{% endif %}" href="{% url 'charts' %}">Charts</a>
                <a class="{% if request.resolver_match.url_name == 'idols' or request.resolver_match.url_name == 'idol_page' or request.resolver_match.url_name == 'idol_universe' %}nav-cinzel text-primary font-normal uppercase tracking-wide transition-colors underline decoration-2 underline-offset-8{% else %}nav-cinzel text-slate-200 hover:text-primary font-normal uppercase tracking-wide transition-colors{% endif %}" href="{% url 'idols' %}">Idols</a>
                <a class="{% if request.resolver_match.url_name == 'schedule' %}nav-cinzel text-primary font-normal uppercase tracking-wide transition-colors underline decoration-2 underline-offset-8{% else %}nav-cinzel text-slate-200 hover:text-primary font-normal uppercase tracking-wide transition-colors{% endif %}" href="{% url 'schedule' %}">Schedule</a>
                <a class="{% if request.resolver_match.url_name == 'news' %}nav-cinzel text-primary font-normal uppercase tracking-wide transition-colors underline decoration-2 underline-offset-8{% else %}nav-cinzel text-slate-200 hover:text-primary font-normal uppercase tracking-wide transition-colors{% endif %}" href="{% url 'news' %}">News</a>
                <a class="{% if request.resolver_match.url_name == 'shop' %}nav-cinzel text-primary font-normal uppercase tracking-wide transition-colors underline decoration-2 underline-offset-8{% else %}nav-cinzel text-slate-200 hover:text-primary font-normal uppercase tracking-wide transition-colors{% endif %}" href="{% url 'shop' %}">Shop</a>
            </nav>
        </div>
        <div class="flex items-center gap-6">
            <form action="{% url 'results' %}" method="GET" class="hidden lg:flex items-center relative group">
                <span class="material-symbols-outlined absolute left-3 text-slate-400 group-focus-within:text-primary transition-colors">search</span>
                <input name="q" class="bg-black/30 border border-primary/30 rounded-full py-2 pl-10 pr-4 text-sm text-white focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all w-64 placeholder:text-slate-500" placeholder="Search artist, song..." type="text"/>
            </form>
            <div class="flex gap-4 items-center">
                <button class="bg-primary text-black font-bold uppercase tracking-[0.2em] text-[10px] md:text-xs px-4 py-3 md:px-8 md:py-4 border border-primary hover:bg-black hover:text-primary transition-colors shadow-[4px_4px_0px_rgba(255,255,255,1)] hover:shadow-none hover:translate-x-[4px] hover:translate-y-[4px]" onclick="window.location.href='{% url 'live' %}'">
                    Start Listening
                </button>
                <a class="hidden md:block nav-cinzel text-white hover:text-primary transition-colors font-normal uppercase tracking-wide px-2" href="{% url 'login' %}">Log In</a>
            </div>
        </div>
    </div>
</header>
{% endif %}

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const header = document.getElementById('main-header');
        
        window.addEventListener('scroll', function() {
            if (window.scrollY > 20) {
                header.classList.add('header-glass');
            } else {
                header.classList.remove('header-glass');
            }
        });
    });
</script>
