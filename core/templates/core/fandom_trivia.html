{% load static %}
<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Fandom Trivia — K-Beats</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: { primary: '#f425c0', secondary: '#00f0ff' },
                fontFamily: { sans: ['Montserrat', 'sans-serif'] }
            }
        }
    };
    </script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; zoom: 0.9; }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(244,37,192,0.3); } 50% { box-shadow: 0 0 40px rgba(244,37,192,0.6); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        @keyframes score-pop { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        @keyframes slide-up { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes countdown-pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }
        .animate-shake { animation: shake 0.4s ease-in-out; }
        .animate-score-pop { animation: score-pop 0.3s ease-out; }
        .animate-slide-up { animation: slide-up 0.5s ease-out both; }
        .animate-countdown { animation: countdown-pulse 1s ease-in-out infinite; }
        .option-correct { border-color: #22c55e !important; background: rgba(34, 197, 94, 0.1) !important; }
        .option-wrong { border-color: #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }
        .option-btn { transition: all 0.2s ease; }
        .option-btn:hover:not(:disabled) { border-color: #f425c0; background: rgba(244, 37, 192, 0.05); transform: translateY(-2px); }
    </style>
</head>
<body class="font-sans text-white" x-data="triviaGame()">

    <!-- Full-screen modal overlay -->
    <div class="fixed inset-0 z-50 bg-black flex flex-col">

        <!-- Top Bar -->
        <div class="flex items-center justify-between px-3 py-2 md:px-6 md:py-4 border-b border-white/10 shrink-0">
            <div class="flex items-center gap-4">
                <a href="{% url 'games' %}" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors">
                    <span class="material-symbols-outlined text-xl">close</span>
                </a>
                <div>
                    <h1 class="text-sm font-black uppercase tracking-[0.2em] text-white">Fandom Trivia</h1>
                    <p class="font-mono text-[9px] tracking-widest uppercase text-slate-600">Test Your Mastery</p>
                </div>
            </div>

            <div class="flex items-center gap-6">
                <!-- Round -->
                <div class="text-center">
                    <span class="font-mono text-[9px] tracking-widest uppercase text-slate-600 block">Round</span>
                    <span class="font-black text-lg text-white" x-text="(currentRound + 1) + '/' + totalRounds"></span>
                </div>
                <!-- Score -->
                <div class="text-center">
                    <span class="font-mono text-[9px] tracking-widest uppercase text-slate-600 block">Score</span>
                    <span class="font-black text-lg text-primary" :class="scoreAnimating && 'animate-score-pop'" x-text="score"></span>
                </div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="w-full h-1 bg-white/5 shrink-0">
            <div class="h-full bg-primary transition-all duration-500 ease-out"
                 :style="'width:' + ((currentRound) / totalRounds * 100) + '%'"></div>
        </div>

        <!-- Game Area -->
        <div class="flex-1 flex items-center justify-center overflow-auto">

            <!-- Intro Screen -->
            <div x-show="state === 'intro'" x-transition class="text-center px-6 max-w-lg">
                <span class="material-symbols-outlined text-7xl text-primary mb-6 block">quiz</span>
                <h2 class="text-4xl md:text-6xl font-black text-white tracking-tighter uppercase leading-none mb-4">
                    FANDOM<br/><span class="text-transparent [-webkit-text-stroke:1.5px_#f425c0]">TRIVIA</span>
                </h2>
                <p class="font-mono text-[10px] tracking-widest uppercase text-slate-500 mb-3">
                    <span x-text="totalRounds"></span> Rounds &bull; 15s Per Question
                </p>
                <p class="text-slate-400 text-sm mb-10 max-w-sm mx-auto">
                    Answer questions about groups, labels, and fandoms to earn points and climb the rankings.
                </p>
                <button @click="startGame()"
                        class="inline-flex items-center gap-3 bg-primary text-black px-10 py-4 font-black uppercase tracking-[0.2em] text-xs border border-primary hover:bg-white hover:border-white transition-colors shadow-[4px_4px_0px_rgba(255,255,255,1)] hover:shadow-none hover:translate-x-[4px] hover:translate-y-[4px]">
                    <span class="material-symbols-outlined text-lg">play_arrow</span> Start Game
                </button>
            </div>

            <!-- Playing Screen -->
            <div x-show="state === 'playing'" x-transition class="w-full max-w-3xl px-4 md:px-6 py-4 md:py-0 animate-slide-up" :key="currentRound">

                <!-- Timer Bar -->
                <div class="flex items-center justify-center gap-3 mb-4 md:mb-12">
                    <span class="material-symbols-outlined text-lg" :class="timeLeft <= 5 ? 'text-red-400 animate-countdown' : 'text-slate-600'">timer</span>
                    <div class="w-48 h-2 bg-white/10">
                        <div class="h-full transition-all duration-1000 ease-linear"
                             :class="timeLeft <= 5 ? 'bg-red-400' : 'bg-secondary'"
                             :style="'width:' + (timeLeft / 15 * 100) + '%'"></div>
                    </div>
                    <span class="font-mono text-sm font-bold w-6 text-right" :class="timeLeft <= 5 ? 'text-red-400' : 'text-slate-500'" x-text="timeLeft"></span>
                </div>

                <!-- Question -->
                <div class="text-center mb-5 md:mb-16" :class="answered && !wasCorrect && 'animate-shake'">
                    <span class="font-mono text-[10px] tracking-widest uppercase text-slate-600 mb-2 md:mb-4 block">Question <span x-text="currentRound+1"></span></span>
                    <h2 class="text-xl md:text-5xl font-black text-white tracking-tighter uppercase leading-tight"
                        x-text="currentQuestion.question"></h2>
                </div>

                <!-- Options -->
                <div class="grid grid-cols-2 md:grid-cols-2 gap-2 md:gap-4">
                    <template x-for="(opt, i) in currentQuestion.options" :key="i">
                        <button @click="answer(opt)"
                                :disabled="answered"
                                class="option-btn group flex items-center gap-2 md:gap-4 p-3 md:p-6 border border-white/10 bg-white/[0.02] text-left"
                                :class="{
                                    'option-correct': answered && opt === currentQuestion.answer,
                                    'option-wrong': answered && selectedOption === opt && opt !== currentQuestion.answer,
                                    'opacity-40': answered && opt !== currentQuestion.answer && selectedOption !== opt
                                }">
                            <div class="w-7 h-7 md:w-10 md:h-10 border shrink-0 flex items-center justify-center font-black text-xs md:text-sm transition-colors"
                                 :class="answered && opt === currentQuestion.answer ? 'border-green-500 text-green-500' : answered && selectedOption === opt && opt !== currentQuestion.answer ? 'border-red-500 text-red-500' : 'border-white/20 text-white/40 group-hover:border-primary group-hover:text-primary'"
                                 x-text="['A','B','C','D'][i]"></div>
                            <span class="text-white text-xs md:text-base font-bold uppercase tracking-tight group-hover:text-primary transition-colors"
                                  x-text="opt"></span>
                        </button>
                    </template>
                </div>

                <!-- Correct Answer Reveal -->
                <div x-show="answered" x-transition class="mt-4 md:mt-10 text-center">
                    <p class="font-mono text-[11px] md:text-[12px] tracking-widest uppercase mb-3 md:mb-6"
                       :class="wasCorrect ? 'text-green-400' : 'text-red-400'"
                       x-text="wasCorrect ? '✓ CORRECT! +' + lastPoints + ' PTS' : '✗ WRONG — THE ANSWER IS ' + currentQuestion.answer.toUpperCase()">
                    </p>
                    <button @click="nextRound()"
                            class="inline-flex items-center gap-2 border border-white/20 text-white px-6 py-3 md:px-8 md:py-4 font-black uppercase tracking-[0.2em] text-[10px] hover:border-primary hover:text-primary transition-colors">
                        <span x-text="currentRound < totalRounds - 1 ? 'Next Question' : 'See Results'"></span>
                        <span class="material-symbols-outlined text-sm">east</span>
                    </button>
                </div>
            </div>

            <!-- Results Screen -->
            <div x-show="state === 'results'" x-transition class="text-center px-6 max-w-lg animate-slide-up">
                <span class="text-6xl mb-6 block">🏆</span>
                <h2 class="text-4xl md:text-6xl font-black text-white tracking-tighter uppercase leading-none mb-3">
                    GAME<br/><span class="text-transparent [-webkit-text-stroke:1.5px_#f425c0]">COMPLETE</span>
                </h2>

                <div class="grid grid-cols-2 gap-0 border border-white/10 my-10">
                    <div class="p-8 border-r border-white/10">
                        <span class="text-4xl font-black text-primary block" x-text="score"></span>
                        <span class="font-mono text-[10px] tracking-widest uppercase text-slate-600 block mt-2">Points</span>
                    </div>
                    <div class="p-8">
                        <span class="text-4xl font-black text-white block" x-text="correctCount + '/' + totalRounds"></span>
                        <span class="font-mono text-[10px] tracking-widest uppercase text-slate-600 block mt-2">Correct</span>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                    <button @click="resetGame()"
                            class="inline-flex items-center gap-2 bg-primary text-black px-10 py-5 font-black uppercase tracking-[0.2em] text-[10px] border border-primary hover:bg-white hover:border-white transition-colors shadow-[4px_4px_0px_rgba(255,255,255,1)] hover:shadow-none hover:translate-x-[4px] hover:translate-y-[4px]">
                        <span class="material-symbols-outlined text-sm">replay</span> Play Again
                    </button>
                    <a href="{% url 'games' %}"
                       class="inline-flex items-center gap-2 border border-white/20 text-white px-10 py-5 font-black uppercase tracking-[0.2em] text-[10px] hover:border-primary hover:text-primary transition-colors">
                        <span class="material-symbols-outlined text-sm">arrow_back</span> Games
                    </a>
                </div>
            </div>

        </div>
    </div>

    <script>
    function triviaGame() {
        const questions = {{ questions_json|safe }};

        return {
            state: 'intro',
            questions: questions,
            currentRound: 0,
            totalRounds: questions.length,
            score: 0,
            correctCount: 0,
            answered: false,
            selectedOption: null,
            wasCorrect: false,
            scoreAnimating: false,
            lastPoints: 0,
            timeLeft: 15,
            timerInterval: null,

            get currentQuestion() {
                return this.questions[this.currentRound] || { question: '', options: [], answer: '' };
            },

            startGame() {
                this.currentRound = 0;
                this.score = 0;
                this.correctCount = 0;
                this.answered = false;
                this.selectedOption = null;
                this.state = 'playing';
                this.startTimer();
            },

            startTimer() {
                this.timeLeft = 15;
                clearInterval(this.timerInterval);
                this.timerInterval = setInterval(() => {
                    this.timeLeft--;
                    if (this.timeLeft <= 0) {
                        clearInterval(this.timerInterval);
                        if (!this.answered) {
                            this.answer(null); 
                        }
                    }
                }, 1000);
            },

            answer(opt) {
                if (this.answered) return;
                clearInterval(this.timerInterval);
                this.answered = true;
                this.selectedOption = opt;

                const correct = opt === this.currentQuestion.answer;
                this.wasCorrect = correct;

                if (correct) {
                    this.correctCount++;
                    const timeBonus = Math.round(this.timeLeft * 5);
                    this.lastPoints = 100 + timeBonus;
                    this.score += this.lastPoints;
                    this.scoreAnimating = true;
                    setTimeout(() => this.scoreAnimating = false, 400);
                } else {
                    this.lastPoints = 0;
                }
            },

            nextRound() {
                if (this.currentRound < this.totalRounds - 1) {
                    this.currentRound++;
                    this.answered = false;
                    this.selectedOption = null;
                    this.wasCorrect = false;
                    this.startTimer();
                } else {
                    this.saveScore();
                    this.state = 'results';
                }
            },

            resetGame() {
                // shuffle and restart
                this.state = 'intro';
                location.reload(); 
            },

            async saveScore() {
                try {
                    await fetch('{% url "save_game_score" %}', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}',
                        },
                        body: JSON.stringify({
                            game: 'fandom_trivia',
                            score: this.score,
                            correct: this.correctCount,
                            total: this.totalRounds,
                        }),
                    });
                } catch (e) {}
            }
        };
    }
    </script>
</body>
</html>
