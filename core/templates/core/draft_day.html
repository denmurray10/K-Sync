{% load static %}
<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Draft Day — K-Beats</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: { primary: '#f425c0', secondary: '#00f0ff', accent: '#fbbf24' },
                fontFamily: { sans: ['Montserrat', 'sans-serif'] }
            }
        }
    };
    </script>
    <style>
        body { margin: 0; background: #000; zoom: 0.9; }
        .gradient-gold { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); }
        .stat-bar { height: 4px; background: rgba(255,255,255,0.1); overflow: hidden; }
        .stat-fill { height: 100%; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px border-white/10; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); }
        .animate-float { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="font-sans text-white" x-data="draftGame()">

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/10">
        <div class="px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="{% url 'games' %}" class="text-slate-400 hover:text-white transition-colors">
                    <span class="material-symbols-outlined text-2xl">close</span>
                </a>
                <div>
                    <h1 class="text-sm font-black uppercase tracking-[0.2em] text-white">Draft Day</h1>
                    <p class="font-mono text-[9px] tracking-widest uppercase text-accent">Fantasy Build Mode</p>
                </div>
            </div>

            <div class="flex items-center gap-10">
                <div class="text-right">
                    <span class="font-mono text-[9px] tracking-widest uppercase text-slate-500 block">Remaining Budget</span>
                    <span class="text-xl font-black text-white" :class="budget < 50 ? 'text-red-400' : 'text-accent'" x-text="'£' + budget + 'M'"></span>
                </div>
                <div class="text-right">
                    <span class="font-mono text-[9px] tracking-widest uppercase text-slate-500 block">Team Power</span>
                    <span class="text-xl font-black text-secondary" x-text="teamPower"></span>
                </div>
                <button @click="finishDraft()" 
                        :disabled="myTeam.length < 3 || budget < 0"
                        class="bg-white text-black px-6 py-2.5 font-black uppercase tracking-[0.1em] text-[10px] hover:bg-accent disabled:opacity-30 disabled:hover:bg-white transition-all">
                    Finalize Lineup
                </button>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-12 px-6 flex flex-col lg:flex-row gap-8 min-h-screen">
        
        <!-- Selection Pool -->
        <div class="flex-1">
            <div class="mb-4 flex items-center justify-between">
                <h2 class="font-black uppercase tracking-tight text-2xl">Idol Pool</h2>
                <span class="text-slate-500 font-mono text-[10px] uppercase" x-text="filteredPool.length + ' Available'"></span>
            </div>

            <!-- Search Filter -->
            <div class="mb-6 relative">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-lg pointer-events-none">search</span>
                <input x-model="search" type="text" placeholder="Search by idol or group name…"
                       class="w-full bg-white/5 border border-white/10 text-white pl-11 pr-4 py-3 font-sans text-sm placeholder-slate-600 focus:border-accent focus:ring-0 focus:outline-none transition-colors" />
                <button x-show="search" @click="search = ''" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors">
                    <span class="material-symbols-outlined text-sm">close</span>
                </button>
            </div>

            <template x-if="filteredPool.length === 0">
                <div class="py-20 text-center">
                    <span class="material-symbols-outlined text-4xl text-white/10 block mb-3">search_off</span>
                    <p class="text-slate-600 font-mono text-[10px] uppercase tracking-widest">No idols match &ldquo;<span x-text="search"></span>&rdquo;</p>
                </div>
            </template>

            <div class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-4">
                <template x-for="idol in filteredPool" :key="idol.name">
                    <div class="glass-card group p-4 border border-white/5 hover:border-accent/30 transition-all flex gap-4">
                        <div class="w-24 h-24 shrink-0 bg-white/5 border border-white/10 overflow-hidden relative">
                            <img :src="idol.image" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500" />
                            <div class="absolute bottom-0 left-0 right-0 bg-accent text-black text-center font-black text-[9px] py-0.5" x-text="'£' + idol.cost + 'M'"></div>
                        </div>
                        
                        <div class="flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="font-black uppercase text-sm group-hover:text-accent transition-colors" x-text="idol.name"></h3>
                                <p class="text-[9px] font-mono text-slate-500 uppercase tracking-widest" x-text="idol.group"></p>
                            </div>
                            
                            <!-- Mini Stats -->
                            <div class="space-y-1.5 mt-2">
                                <div class="flex items-center justify-between">
                                    <span class="text-[8px] font-mono uppercase text-slate-600">VCL</span>
                                    <div class="flex-1 mx-2 stat-bar"><div class="stat-fill bg-white/40" :style="'width:'+idol.stats.vocal+'%'"></div></div>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-[8px] font-mono uppercase text-slate-600">DNC</span>
                                    <div class="flex-1 mx-2 stat-bar"><div class="stat-fill bg-white/40" :style="'width:'+idol.stats.dance+'%'"></div></div>
                                </div>
                            </div>
                            
                            <button @click="addToTeam(idol)" 
                                    :disabled="isAlreadyInTeam(idol) || myTeam.length >= 9 || budget < idol.cost"
                                    class="mt-3 w-full border border-white/10 py-1.5 font-black uppercase text-[9px] hover:bg-white hover:text-black transition-all disabled:opacity-10"
                                    x-text="isAlreadyInTeam(idol) ? 'Drafted' : 'Add to Team'">
                            </button>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- My Lineup Sidebar -->
        <div class="w-full lg:w-96 shrink-0">
            <div class="sticky top-24">
                <div class="mb-6">
                    <h2 class="font-black uppercase tracking-tight text-2xl">My Lineup</h2>
                    <p class="text-slate-500 font-mono text-[10px] uppercase mt-1">Select 3–9 Idols</p>
                </div>

                <div class="space-y-4">
                    <template x-for="(idol, index) in myTeam" :key="index">
                        <div class="bg-white/5 border-l-2 border-accent p-4 flex items-center justify-between group">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-full overflow-hidden border border-white/20">
                                    <img :src="idol.image" class="w-full h-full object-cover" />
                                </div>
                                <div>
                                    <h4 class="font-black uppercase text-xs" x-text="idol.name"></h4>
                                    <p class="text-[8px] font-mono text-accent" x-text="'£' + idol.cost + 'M'"></p>
                                </div>
                            </div>
                            <button @click="removeFromTeam(index)" class="text-slate-600 hover:text-red-400 transition-colors">
                                <span class="material-symbols-outlined text-sm">remove_circle</span>
                            </button>
                        </div>
                    </template>
                    
                    <template x-if="myTeam.length === 0">
                        <div class="border-2 border-dashed border-white/5 p-12 text-center">
                            <span class="material-symbols-outlined text-4xl text-white/10 mb-2">person_add</span>
                            <p class="text-slate-600 font-mono text-[9px] uppercase tracking-widest leading-relaxed">Your agency is empty.<br/>Draft your first idol.</p>
                        </div>
                    </template>
                </div>

                <!-- Analysis Reveal (Mock) -->
                <div x-show="myTeam.length >= 3" x-transition class="mt-8 p-6 bg-accent/5 border border-accent/20">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="material-symbols-outlined text-accent text-sm">analytics</span>
                        <h4 class="font-black uppercase text-[10px] tracking-widest text-accent">Group Synergy Analysis</h4>
                    </div>
                    <div class="space-y-3">
                        <div class="flex items-center justify-between text-[10px] font-bold uppercase">
                            <span class="text-slate-400">Vocal Power</span>
                            <span class="text-white" x-text="avgStat('vocal')"></span>
                        </div>
                        <div class="flex items-center justify-between text-[10px] font-bold uppercase">
                            <span class="text-slate-400">Performance</span>
                            <span class="text-white" x-text="avgStat('dance')"></span>
                        </div>
                        <div class="flex items-center justify-between text-[10px] font-bold uppercase border-t border-accent/10 pt-3">
                            <span class="text-accent">Estimated Peak Rank</span>
                            <span class="text-accent">#1 WORLDWIDE</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Overlay for Finish -->
    <template x-if="state === 'finished'">
        <div class="fixed inset-0 z-[100] bg-black/95 flex items-center justify-center p-6 text-center">
            <div class="max-w-2xl w-full animate-slide-up">
                <span class="material-symbols-outlined text-8xl text-accent mb-8 block animate-float">stars</span>
                <h2 class="text-5xl md:text-7xl font-black tracking-tighter uppercase leading-none mb-6 italic">LINEUP<br/><span class="text-transparent [-webkit-text-stroke:1px_#fbbf24]">CERTIFIED</span></h2>
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 my-10">
                    <div class="p-6 border border-white/10 bg-white/5">
                        <span class="text-2xl font-black text-accent block" x-text="teamPower"></span>
                        <span class="font-mono text-[8px] tracking-widest uppercase text-slate-500 block mt-1">Team Power</span>
                    </div>
                    <div class="p-6 border border-white/10 bg-white/5">
                        <span class="text-2xl font-black text-white block" x-text="'£' + spentBudget + 'M'"></span>
                        <span class="font-mono text-[8px] tracking-widest uppercase text-slate-500 block mt-1">Total Cost</span>
                    </div>
                    <div class="p-6 border border-white/10 bg-white/5">
                        <span class="text-2xl font-black text-white block" x-text="myTeam.length"></span>
                        <span class="font-mono text-[8px] tracking-widest uppercase text-slate-500 block mt-1">Members</span>
                    </div>
                    <div class="p-6 border border-white/10 bg-white/5">
                        <span class="text-2xl font-black text-secondary block">PLATINUM</span>
                        <span class="font-mono text-[8px] tracking-widest uppercase text-slate-500 block mt-1">Potential</span>
                    </div>
                </div>

                <div class="flex items-center justify-center gap-4">
                     <button @click="reset()" class="bg-accent text-black px-10 py-5 font-black uppercase tracking-[0.2em] text-[10px] hover:bg-white transition-all shadow-[4px_4px_0px_white] hover:shadow-none hover:translate-x-1 hover:translate-y-1">Start New Draft</button>
                     <a href="{% url 'games' %}" class="border border-white/20 px-10 py-5 font-black uppercase tracking-[0.2em] text-[10px] hover:bg-white hover:text-black transition-all">Back to Games</a>
                </div>
            </div>
        </div>
    </template>

    <script>
    function draftGame() {
        const poolData = {{ draft_pool_json|safe }};

        return {
            state: 'intro',
            pool: poolData,
            search: '',
            myTeam: [],
            budget: 150,

            get filteredPool() {
                const q = this.search.toLowerCase().trim();
                if (!q) return this.pool;
                return this.pool.filter(i =>
                    i.name.toLowerCase().includes(q) ||
                    (i.group && i.group.toLowerCase().includes(q))
                );
            },
            
            get teamPower() {
                if (this.myTeam.length === 0) return 0;
                let total = 0;
                this.myTeam.forEach(i => {
                    total += (i.stats.vocal + i.stats.dance + i.stats.rap + i.stats.visual) / 4;
                });
                return Math.round(total / this.myTeam.length * (this.myTeam.length / 9 * 1.5) * 10);
            },

            get spentBudget() {
                return 150 - this.budget;
            },

            isAlreadyInTeam(idol) {
                return this.myTeam.some(i => i.name === idol.name);
            },

            addToTeam(idol) {
                if (this.myTeam.length >= 9 || this.budget < idol.cost) return;
                this.myTeam.push(idol);
                this.budget -= idol.cost;
            },

            removeFromTeam(index) {
                const idol = this.myTeam[index];
                this.budget += idol.cost;
                this.myTeam.splice(index, 1);
            },

            avgStat(key) {
                if (this.myTeam.length === 0) return 0;
                let sum = 0;
                this.myTeam.forEach(i => sum += i.stats[key]);
                return Math.round(sum / this.myTeam.length);
            },

            finishDraft() {
                this.state = 'finished';
                this.saveScore();
            },

            reset() {
                location.reload();
            },

            async saveScore() {
                try {
                    await fetch('{% url "save_game_score" %}', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': '{{ csrf_token }}',
                        },
                        body: JSON.stringify({
                            game: 'draft_day',
                            score: this.teamPower,
                            total: this.myTeam.length,
                        }),
                    });
                } catch (e) {}
            }
        };
    }
    </script>
</body>
</html>
