<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="220" y1="120" x2="1400" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#031318"/>
      <stop offset="0.5" stop-color="#060008"/>
      <stop offset="1" stop-color="#14000F"/>
    </linearGradient>
    <radialGradient id="pinkGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1180 220) rotate(124.824) scale(760 560)">
      <stop stop-color="#F425C0" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#F425C0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 260) rotate(59.421) scale(740 540)">
      <stop stop-color="#00F0FF" stop-opacity="0.32"/>
