<svg width="1600" height="1200" viewBox="0 0 1600 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="120" x2="1440" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14000D"/>
      <stop offset="0.52" stop-color="#050307"/>
      <stop offset="1" stop-color="#001116"/>
    </linearGradient>
    <radialGradient id="pinkGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(420 300) rotate(41.5) scale(780 540)">
      <stop stop-color="#F425C0" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#F425C0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1230 310) rotate(141) scale(760 560)">
      <stop stop-color="#00F0FF" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#00F0FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowPink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowCyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>
  <rect width="1600" height="1200" fill="url(#pinkGlow)"/>
  <rect width="1600" height="1200" fill="url(#cyanGlow)"/>

  <g opacity="0.12">
    <path d="M200 180H1420" stroke="#FFFFFF"/>
    <path d="M200 380H1420" stroke="#FFFFFF"/>
    <path d="M200 580H1420" stroke="#FFFFFF"/>
    <path d="M200 780H1420" stroke="#FFFFFF"/>
    <path d="M200 980H1420" stroke="#FFFFFF"/>
    <path d="M200 180V980" stroke="#FFFFFF"/>
    <path d="M480 180V980" stroke="#FFFFFF"/>
    <path d="M760 180V980" stroke="#FFFFFF"/>
    <path d="M1040 180V980" stroke="#FFFFFF"/>
    <path d="M1320 180V980" stroke="#FFFFFF"/>
  </g>

  <g>
    <rect x="260" y="440" width="430" height="340" fill="#050505" stroke="#F425C0" stroke-opacity="0.25" stroke-width="3"/>
    <rect x="910" y="440" width="430" height="340" fill="#050505" stroke="#00F0FF" stroke-opacity="0.25" stroke-width="3"/>
    <path d="M330 700L420 650L510 690L600 560L650 590" stroke="#F425C0" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowPink)"/>
    <path d="M980 720L1060 640L1150 610L1240 500L1300 460" stroke="#00F0FF" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" filter="url(#glowCyan)"/>
    <circle cx="420" cy="650" r="18" fill="#F425C0"/>
    <circle cx="600" cy="560" r="18" fill="#F425C0"/>
    <circle cx="1060" cy="640" r="18" fill="#00F0FF"/>
    <circle cx="1240" cy="500" r="18" fill="#00F0FF"/>
  </g>

  <g>
    <circle cx="800" cy="615" r="86" fill="#060606" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="4"/>
    <text x="800" y="637" text-anchor="middle" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-size="76" font-weight="900" letter-spacing="-4">VS</text>
  </g>

  <g transform="translate(220 170)">
    <text x="0" y="0" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-size="40" font-weight="800" letter-spacing="12">K-BEATS ARCADE</text>
    <text x="0" y="150" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-size="150" font-weight="900" letter-spacing="-8">CHART</text>
    <text x="0" y="276" fill="none" stroke="#F425C0" stroke-width="3" font-family="Montserrat, Arial, sans-serif" font-size="150" font-weight="900" letter-spacing="-8">CLASH</text>
    <text x="0" y="352" fill="#9CA3AF" font-family="Montserrat, Arial, sans-serif" font-size="34" font-weight="600" letter-spacing="5">PICK THE HIGHER HIT. TRUST YOUR INSTINCT.</text>
  </g>

  <g transform="translate(1180 180)">
    <rect width="190" height="88" fill="#030303" stroke="#F425C0" stroke-opacity="0.34"/>
    <text x="24" y="34" fill="#F425C0" font-family="Montserrat, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="4">ROUND 05</text>
    <text x="24" y="66" fill="#FFFFFF" font-family="Montserrat, Arial, sans-serif" font-size="28" font-weight="900">WHO CHARTED HIGHER?</text>
  </g>
</svg>
