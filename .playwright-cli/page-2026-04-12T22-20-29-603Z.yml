        - heading "Biography" [level=2] [ref=e80]
        - generic [ref=e81]:
          - paragraph [ref=e82]: Jennie Kim, popularly known as Jennie, is a South Korean rapper, singer-songwriter, and actress under ODD ATELIER and Columbia Records. She rose to global fame as the main rapper and lead vocalist of the internationally recognized K-pop girl group BLACKPINK, which debuted under YG Entertainment in 2016. Jennie has since built a successful solo career, becoming one of the most prominent figures in the Korean entertainment industry. Jennie spent her formative years across South Korea, Australia, and New Zealand before returning to Seoul to train under YG Entertainment. Prior to her official debut, she gained early recognition through high-profile collaborations, including G-Dragon's"That XX"and features on tracks by Lee Hi, Seungri, and G-Dragon. Her global debut with BLACKPINK marked the beginning of her rise as a household name in K-pop. Jennie launched her solo music career with the single"Solo"in 2018. The track topped South Koreas Circle Digital Chart and the Billboard World Digital Songs chart, while its music video became the first by a Korean female soloist to surpass one billion views on YouTube.
          - paragraph [ref=e83]: Her later releases, including"You & Me"and"One of the Girls,"further cemented her position as a leading solo artist on the global stage. In 2023, Jennie made her acting debut in the HBO series The Idol under the name Jennie Ruby Jane, gaining international attention for her performance. That same year, she renewed her group contract with BLACKPINK while taking control of her solo ventures. She established her agency, ODD ATELIER, to oversee her individual projects and later signed with Columbia Records to expand her presence in the United States. Her 2024 single"Mantra"and the album Ruby (2025) achieved significant commercial success. The album sold over one million copies worldwide and produced multiple top-charting tracks, including"like JENNIE"."Mantra"made history as the highest-ranking song by a Korean female soloist on the UK Singles Chart. Jennie has earned numerous accolades, including awards from MAMA, the Circle Chart, Golden Disc, and Billboard Women in Music, where she became the first Korean soloist to win. Renowned for her influence in fashion, she serves as a global ambassador for Chanel and is frequently referred to as the"Human Chanel"in media and fan communities.
